services:
  app:
    build: .
    container_name: spend-analyzer-app
    ports:
      - "${APP_PORT}:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      identity-provider:
        condition: service_started

  db:
    image: postgres:16
    container_name: spend-analyzer-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - spend_analyzer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 15

  flyway:
    image: flyway/flyway:latest
    container_name: spend-analyzer-flyway
    environment:
      FLYWAY_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      FLYWAY_USER: ${DB_USER}
      FLYWAY_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/migration:/flyway/sql
    command: migrate

  identity-provider:
    image: quay.io/keycloak/keycloak:25.0
    container_name: spend-analyzer-idp
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"

volumes:
  spend_analyzer_pgdata: