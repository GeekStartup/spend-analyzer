global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: spend-analyzer-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - app:8000

  - job_name: spend-analyzer-postgresql
    static_configs:
      - targets:
          - postgres-exporter:9187
