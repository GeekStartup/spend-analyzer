name: Build

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - "**"

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build application image
        run: docker build .

      - name: Run fast tests
        run: pytest

      - name: Run integration tests
        run: pytest --integration

      - name: Clean up integration stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

      - name: Mark PR build passed
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            }

            async function removeLabelIfPresent(name) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            await ensureLabel('build-passed', '0E8A16', 'Build and tests passed');
            await ensureLabel('build-failed', 'B60205', 'Build or tests failed');
            await removeLabelIfPresent('build-failed');
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['build-passed'] });

      - name: Mark PR build failed
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            }

            async function removeLabelIfPresent(name) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            await ensureLabel('build-passed', '0E8A16', 'Build and tests passed');
            await ensureLabel('build-failed', 'B60205', 'Build or tests failed');
            await removeLabelIfPresent('build-passed');
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['build-failed'] });
