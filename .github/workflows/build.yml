name: Build

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_VERSION: "26.1.2"

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install pinned pip version
        run: python -m pip install --upgrade "pip==${PIP_VERSION}"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Prepare Compose environment
        run: cp .env.example .env

      - name: Validate Docker Compose configurations
        run: |
          docker compose config --quiet
          docker compose --profile observability config --quiet
          docker compose -f docker-compose.test.yml config --quiet

      - name: Run Ruff lint
        run: python -m ruff check --output-format=github .

      - name: Run Ruff format check
        run: python -m ruff format --check .

      - name: Run Bandit security scan
        run: python -m bandit -r app

      - name: Audit runtime Python dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Audit development Python dependencies
        run: python -m pip_audit -r requirements-dev.txt

      - name: Run tests with coverage
        run: >-
          python -m pytest
          --cov=app
          --cov-branch
          --cov-report=term-missing
          --cov-report=json:${GITHUB_WORKSPACE}/coverage.json

      - name: Check coverage thresholds
        run: python scripts/check_coverage.py "$GITHUB_WORKSPACE/coverage.json" 95 95

      - name: Upload coverage JSON
        if: always() && hashFiles('coverage.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-json
          path: ${{ github.workspace }}/coverage.json
          if-no-files-found: error
          retention-days: 7

      - name: Clean up integration stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

      - name: Delete coverage JSON
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/coverage.json"
